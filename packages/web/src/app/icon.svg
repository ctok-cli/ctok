<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="5.5" fill="#0d0e1a"/>
  <!-- code lines -->
  <rect x="4" y="5"  width="14" height="2" rx="1" fill="#1e2348"/>
  <rect x="4" y="9"  width="11" height="2" rx="1" fill="#1e2348"/>
  <rect x="4" y="13" width="17" height="2" rx="1" fill="#1e2348"/>
  <rect x="4" y="17" width="9"  height="2" rx="1" fill="#1e2348"/>
  <rect x="4" y="21" width="13" height="2" rx="1" fill="#1e2348"/>
  <!-- active line highlight -->
  <rect x="4" y="13" width="17" height="2" rx="1" fill="#F5A623" opacity="0.55"/>
  <!-- scan line -->
  <line x1="2" y1="14" x2="26" y2="14" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
  <!-- scan head -->
  <circle cx="26" cy="14" r="2" fill="#F5A623"/>
  <circle cx="26" cy="14" r="0.8" fill="#ffffff"/>
</svg>
