name: Bug report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - CLI (`ctok` command)
        - Web playground (ctok-cli.github.io/ctok)
        - MCP server (@ctok/mcp)
        - Desktop app
        - Browser extension
        - npm package (@ctok/core, @ctok/refiner, etc.)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ctok version
      description: Run `ctok --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `ctok check "..."`
        2. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Windows 11 / macOS 15 / Ubuntu 24.04
        Node: 20.11.0
        Shell: zsh / PowerShell 7
