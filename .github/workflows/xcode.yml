name: Xcode Extension - CI

on:
  push:
    branches: [main]
    paths:
      - "apps/xcode/**"
  pull_request:
    paths:
      - "apps/xcode/**"

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      # Use the runner's pre-installed Xcode. macos-14 ships Xcode 15.x,
      # macos-15 ships Xcode 16.x. Don't pin a specific path - the runner
      # image may rotate versions without notice.
      - name: Show selected Xcode
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Build
        run: swift build
        working-directory: apps/xcode/ctok-xcode

      - name: Test
        run: swift test
        working-directory: apps/xcode/ctok-xcode

      - name: Build release archive
        run: swift build -c release
        working-directory: apps/xcode/ctok-xcode
