name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @ctok/core build
          pnpm --filter @ctok/scanner build
          pnpm --filter @ctok/refiner build
          pnpm --filter @ctok/quota build
          pnpm --filter @ctok/cli build
          pnpm --filter @ctok/mcp build

      - name: Publish @ctok/core
        run: pnpm --filter @ctok/core publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ctok/scanner
        run: pnpm --filter @ctok/scanner publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ctok/refiner
        run: pnpm --filter @ctok/refiner publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ctok/quota
        run: pnpm --filter @ctok/quota publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ctok/cli
        run: pnpm --filter @ctok/cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ctok/mcp
        run: pnpm --filter @ctok/mcp publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
