name: Raycast Extension

on:
  push:
    paths:
      - "apps/raycast/**"
      - "packages/core/**"
      - "packages/refiner/**"
      - "packages/scanner/**"
      - "packages/quota/**"
  pull_request:
    paths:
      - "apps/raycast/**"
      - "packages/core/**"
      - "packages/refiner/**"
      - "packages/scanner/**"
      - "packages/quota/**"

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @ctok/raycast typecheck

      - name: Test
        run: pnpm --filter @ctok/raycast test

  # ray build requires macOS + the Raycast app installed, so we only
  # typecheck and test in CI. The full build is done locally before publishing
  # via `pnpm --filter @ctok/raycast publish`.
