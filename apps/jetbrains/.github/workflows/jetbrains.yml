name: JetBrains Plugin

on:
  push:
    paths:
      - "apps/jetbrains/**"
  pull_request:
    paths:
      - "apps/jetbrains/**"

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x apps/jetbrains/gradlew

      - name: Run tests
        working-directory: apps/jetbrains
        run: ./gradlew test

      - name: Build plugin
        working-directory: apps/jetbrains
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctok-jetbrains-${{ github.sha }}.zip
          path: apps/jetbrains/build/distributions/*.zip
          retention-days: 14

  verify:
    name: Verify plugin structure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x apps/jetbrains/gradlew

      - name: Run plugin verifier
        working-directory: apps/jetbrains
        run: ./gradlew verifyPlugin
        continue-on-error: true   # verifier warnings should not block the build
