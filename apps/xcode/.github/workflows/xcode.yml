name: xcode

on:
  push:
    paths:
      - "apps/xcode/**"
      - ".github/workflows/xcode.yml"
  pull_request:
    paths:
      - "apps/xcode/**"

jobs:
  build:
    runs-on: macos-14   # Xcode 15, Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/xcode
        run: xcodegen generate

      - name: Build (no signing)
        working-directory: apps/xcode
        run: |
          xcodebuild \
            -project CtokXcode.xcodeproj \
            -scheme CtokXcodeApp \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | xcpretty || cat

      - name: Archive .app (optional, upload as artifact)
        working-directory: apps/xcode
        run: |
          xcodebuild \
            -project CtokXcode.xcodeproj \
            -scheme CtokXcodeApp \
            -configuration Release \
            -archivePath build/CtokXcode.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            | xcpretty || true

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: CtokXcode-archive
          path: apps/xcode/build/CtokXcode.xcarchive
          if-no-files-found: ignore
