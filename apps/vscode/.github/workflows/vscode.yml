name: VS Code Extension

on:
  push:
    paths:
      - "apps/vscode/**"
      - "packages/core/**"
      - "packages/refiner/**"
      - "packages/scanner/**"
      - "packages/quota/**"
  pull_request:
    paths:
      - "apps/vscode/**"
      - "packages/core/**"
      - "packages/refiner/**"
      - "packages/scanner/**"
      - "packages/quota/**"

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ctok-vscode typecheck

      - name: Test
        run: pnpm --filter ctok-vscode test

      - name: Build
        run: pnpm --filter ctok-vscode build

      - name: Package .vsix
        run: pnpm --filter ctok-vscode package

      - uses: actions/upload-artifact@v4
        with:
          name: ctok-vscode-${{ github.sha }}.vsix
          path: apps/vscode/*.vsix
          retention-days: 14
